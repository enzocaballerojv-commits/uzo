      radial-gradient(1200px 600px at 50% -10%, rgba(0,255,136,0.06), transparent 60%),

    padding-bottom: env(safe-area-inset-bottom);

  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

  /* Toggle */
  .toggle { width: 52px; height: 30px; border-radius: 999px; background:#2a2a31; position:relative; transition:.25s; flex:none; }
  .toggle::after { content:''; position:absolute; top:3px; left:3px; width:24px; height:24px; border-radius:999px; background:#7a7a85; transition:.25s; }
  .toggle.on { background: rgba(0,255,136,.25); }
  .toggle.on::after { left:25px; background:#00ff88; box-shadow:0 0 12px rgba(0,255,136,.7); }

  .glow { box-shadow: 0 0 0 1px rgba(0,255,136,.25), 0 0 24px rgba(0,255,136,.12); }
  .ring-prog { transition: stroke-dashoffset .5s ease; }
  @keyframes pop { 0%{transform:scale(.9);opacity:0} 100%{transform:scale(1);opacity:1} }
  .pop { animation: pop .22s ease; }
  @keyframes slideup { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .sheet-in { animation: slideup .28s cubic-bezier(.2,.8,.2,1); }
  @keyframes fadein { from{opacity:0} to{opacity:1} }

  .tap:active { transform: scale(.97); }

<script>
/* =========================================================
   ESTADO Y PERSISTENCIA
   ========================================================= */
const STORAGE_KEY = 'mutacion2026_v1';
const DAYS = ['dom','lun','mar','mie','jue','vie','sab'];
const DAY_NAMES = {lun:'Lunes',mar:'Martes',mie:'Miércoles',jue:'Jueves',vie:'Viernes',sab:'Sábado',dom:'Domingo'};

/* Rutina por defecto (editable por el usuario) */
function defaultRoutine() {
  return {
    lun: { type:'strength', title:'Empuje · Push', accent:'neon', exercises:[
      ex('Press de Banca Plano con Barra','Press de Banca Plano con Mancuernas',4,6,8,'90-120s'),
      ex('Press Inclinado con Mancuernas','Press Inclinado en Máquina / Barra',3,8,10,'90s'),
      ex('Aperturas en Banco Plano / Pec Deck','Cruces de Polea Alta a Baja',3,10,12,'60-90s'),
      ex('Press Militar con Barra de Pie','Press de Hombros con Mancuernas Sentado',3,6,8,'90-120s'),
      ex('Elevaciones Laterales con Mancuerna','Elevaciones Laterales en Polea Baja',4,12,15,'45-60s'),
      ex('Extensión de Tríceps en Polea con Soga','Press Francés con Barra Z / Recta',3,10,12,'60s'),
    ]},
    mar: { type:'running', title:'Running · Zona 2', durMin:30, durMax:40, pulseMax:null,
      note:'Paso aeróbico cómodo (conversacional). Suma pasos hacia los 10.000.' },
    mie: { type:'strength', title:'Piernas · Base', accent:'neon', exercises:[
      ex('Prensa de Piernas Bilateral','Sentadilla Hack / Goblet pesada',3,8,10,'90-120s'),
      ex('Sillón de Isquios / Leg Curl','Peso Muerto Rumano con Mancuernas',3,10,12,'90s'),
      ex('Extensión de Cuádriceps en Máquina','Zancadas Estáticas con Apoyo',3,12,12,'60-90s'),
      ex('Elevación de Talones / Gemelos de Pie','Elevación de Talones en Prensa / Sentado',4,15,15,'45-60s'),
      ex('Rueda Abdominal / Crunch en Polea','Plancha Isométrica (45 seg)',3,10,12,'60s'),
    ]},
    jue: { type:'running', title:'Running · Lavado Activo', durMin:45, durMax:50, pulseMax:145,
      note:'Regenerativo muy lento. Tope estricto de pulso: < 145 bpm.' },
    vie: { type:'strength', title:'Tirón · Pull', accent:'neon', exercises:[
      ex('Dominadas Asistidas / Jalón al Pecho','Remo Gironda en Polea (agarre cerrado)',4,6,8,'90-120s'),
      ex('Remo con Barra Inclinado / en Máquina','Remo Unilateral con Mancuerna',4,6,8,'90-120s'),
      ex('Pullover en Polea Alta con Soga','Pullover con Mancuerna en Banco Plano',3,12,12,'60-90s'),
      ex('Extensiones Lumbares en Banco','Puente de Glúteos / Hip Thrust pesado',3,12,12,'60-90s'),
      ex('Curl de Bíceps con Barra Z','Curl Alterno con Mancuernas',3,8,10,'60s'),
      ex('Curl Martillo con Mancuernas','Curl Martillo en Polea Baja con Soga',3,10,10,'60s'),
    ]},
    sab: { type:'running', title:'Fondo Largo / Caminata', durMin:60, durMax:90, pulseMax:148,
      note:'12 km a paso aeróbico puro (< 148 bpm) o caminata larga para romper los 10.000 pasos.' },
    dom: { type:'rest', title:'Descanso Absoluto', note:'Bloqueo total para reparación muscular.' },
  };
}

function ex(name, alt, sets, repMin, repMax, rest) {
  return { id: 'e'+Math.random().toString(36).slice(2,9), name, alt, sets, repMin, repMax, rest, swapped:false };
}

let state = load();

function load() {
  let s = null;
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { const p = JSON.parse(raw); if (p && p.routine) s = p; }
  } catch(e) {}
  if (!s) s = { version:1, units:'kg', deload:false, stepGoal:10000, routine: defaultRoutine(), logs:{}, targets:{} };
  // Migración / valores por defecto de periodización automática
  if (s.autoPeriodization === undefined) s.autoPeriodization = true; // automático activado por defecto
  if (s.cycleLength === undefined) s.cycleLength = 3;   // semanas duras antes de la descarga
  if (s.weekThreshold === undefined) s.weekThreshold = 3; // días mínimos para contar una semana
  return s;
}
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch(e) { toast('⚠️ No se pudo guardar (almacenamiento lleno)'); }
}

/* =========================================================
   UTILIDADES DE FECHA Y LOGS
   ========================================================= */
function todayKey(d=new Date()){ return d.toISOString().slice(0,10); }
function dayCode(d=new Date()){ return DAYS[d.getDay()]; }
function getLog(key){ if(!state.logs[key]) state.logs[key]={steps:0,running:null,strength:{}}; return state.logs[key]; }
function target(exId){ return state.targets[exId] || {weight:0, reps:null}; }
function effectiveSets(sets){ return isDeloadActive() ? Math.max(1, Math.round(sets/2)) : sets; }

/* ---- PERIODIZACIÓN AUTOMÁTICA ---- */
function isoWeek(d){
  const t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const day=t.getUTCDay()||7; t.setUTCDate(t.getUTCDate()+4-day);
  const ys=new Date(Date.UTC(t.getUTCFullYear(),0,1));
  const wk=Math.ceil((((t-ys)/86400000)+1)/7);
  return t.getUTCFullYear()+'-W'+String(wk).padStart(2,'0');
}
function dayWasTrained(l){
  if(!l) return false;
  if(l.running && l.running.done) return true;
  if(l.strength && Object.values(l.strength).some(x=> x.sets && x.sets.some(s=> s && s.reps))) return true;
  return false;
}
function weeklyTraining(){
  const weeks={};
  Object.entries(state.logs).forEach(([dk,l])=>{
    if(dayWasTrained(l)){ const wk=isoWeek(new Date(dk+'T12:00:00')); (weeks[wk]=weeks[wk]||new Set()).add(dk); }
  });
  return weeks;
}
function completedTrainingWeeks(){
  const weeks=weeklyTraining(); const cur=isoWeek(new Date()); let n=0;
  Object.entries(weeks).forEach(([wk,days])=>{ if(wk<cur && days.size>=state.weekThreshold) n++; });
  return n;
}
function currentPhase(){
  const L=Math.max(2, state.cycleLength);
  const pos = completedTrainingWeeks() % (L+1); // 0..L  (L = semana de descarga)
  const isDeload = pos===L;
  const daysThisWeek = (weeklyTraining()[isoWeek(new Date())]||new Set()).size;
  let name, desc, rir;
  if(isDeload){
    name='Descarga'; rir='—';
    desc='Recuperación: series a la mitad con el mismo peso y cardio reducido. Dejá que el sistema nervioso y las articulaciones se recuperen para volver más fuerte.';
  } else {
    const wk=pos+1;
    if(wk===1){ name='Adaptación'; rir='3-4'; desc='Arrancá controlado. Dejá 3-4 reps en reserva y quedate en el extremo bajo del rango. Técnica impecable, sin buscar el fallo.'; }
    else if(wk===L){ name='Intensificación'; rir='0-1'; desc='Semana fuerte. Series cerca del fallo (0-1 reps en reserva) y buscá el tope del rango para disparar la progresión de peso.'; }
    else { name='Acumulación'; rir='2'; desc='Subí la exigencia: ~2 reps en reserva, acercándote al tope de repeticiones cada serie.'; }
  }
  return { pos, week:pos+1, total:L, isDeload, name, desc, rir, daysThisWeek };
}
function isDeloadActive(){ return state.autoPeriodization ? currentPhase().isDeload : !!state.deload; }

/* =========================================================
   NAVEGACIÓN
   ========================================================= */
let currentTab = 'hoy';
function setTab(t){
  currentTab = t;
  document.querySelectorAll('.navbtn').forEach(b=>{
    b.classList.toggle('text-neon', b.dataset.tab===t);
    b.classList.toggle('text-muted', b.dataset.tab!==t);
  });
  render();
}
document.querySelectorAll('.navbtn').forEach(b=> b.onclick = ()=> setTab(b.dataset.tab));

/* =========================================================
   RENDER PRINCIPAL
   ========================================================= */
function render(){
  const dl = document.getElementById('deloadBanner');
  const active = isDeloadActive();
  dl.classList.toggle('hidden', !active);
  if(active){
    const auto = state.autoPeriodization;
    dl.querySelector('.dl-title').textContent = auto ? 'Semana de Descarga (automática)' : 'Semana de Descarga activa';
    dl.querySelector('.dl-sub').textContent = 'Series a la mitad · mismo peso · cardio reducido';
  }
  document.getElementById('dateLabel').textContent =
    new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'}).toUpperCase();

  const v = document.getElementById('view');
  if (currentTab==='hoy') v.innerHTML = viewToday();
  else if (currentTab==='semana') v.innerHTML = viewWeek();
  else v.innerHTML = viewProgress();
  bindView();
}

/* ---------- VISTA HOY ---------- */
function viewToday(){
  const code = dayCode();
  const day = state.routine[code];
  const log = getLog(todayKey());

  let html = phaseStrip();
  html += stepWidget(log);

  if (day.type==='rest'){
    html += `<div class="mt-4 rounded-2xl border border-line bg-panel p-6 text-center fade-in">
      <div class="text-5xl mb-2">🛌</div>
      <div class="font-display text-2xl font-bold">${day.title}</div>
      <div class="text-sm text-muted mt-1">${day.note}</div>
    </div>`;
    return html;
  }

  if (day.type==='running'){
    html += runningCard(code, day, log, true);
    return html;
  }

  // strength
  html += `<div class="mt-4 flex items-center justify-between">
      <div>
        <div class="text-[11px] uppercase tracking-[0.2em] text-neon font-semibold">${DAY_NAMES[code]}</div>
        <div class="font-display text-3xl font-extrabold leading-none">${day.title}</div>
      </div>
      <button class="editDay tap px-3 py-2 rounded-xl bg-panel border border-line text-xs font-semibold text-muted flex items-center gap-1.5" data-day="${code}">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
        Editar
      </button>
    </div>`;

  html += `<div class="mt-4 space-y-3">`;
  day.exercises.forEach((e,i)=> html += exerciseCard(code, e, i, log));
  html += `</div>`;
  return html;
}

function phaseStrip(){
  if(!state.autoPeriodization){
    const on = !!state.deload;
    return `<div class="mb-4 rounded-2xl border border-line bg-panel px-4 py-3 fade-in flex items-center justify-between">
      <div>
        <div class="text-[11px] uppercase tracking-[0.18em] text-muted">Periodización manual</div>
        <div class="font-display text-lg font-bold ${on?'text-sport':''}">${on?'Descarga activada':'Carga normal'}</div>
      </div>
      <div class="text-[11px] text-muted text-right max-w-[45%]">Activá el modo automático en Ajustes para que la app maneje las descargas sola.</div>
    </div>`;
  }
  const p=currentPhase();
  const dots = Array.from({length:p.total+1}).map((_,i)=>{
    const isD = i===p.total;
    const cur = i===p.pos;
    const cls = cur ? (p.isDeload?'bg-sport':'bg-neon') : (i<p.pos?'bg-neon/40':'bg-line');
    return `<div class="flex-1 h-1.5 rounded-full ${cls}" title="${isD?'Descarga':'Semana '+(i+1)}"></div>`;
  }).join('');
  const accent = p.isDeload ? 'sport' : 'neon';
  return `
  <div class="mb-4 rounded-2xl border ${p.isDeload?'border-sport/40':'border-line'} bg-panel p-4 fade-in">
    <div class="flex items-center justify-between mb-2.5">
      <div class="text-[11px] uppercase tracking-[0.18em] text-muted">Mesociclo · automático</div>
      <div class="text-[11px] text-muted tnum">${p.daysThisWeek} ${p.daysThisWeek===1?'día':'días'} esta semana</div>
    </div>
    <div class="flex gap-1.5 mb-3">${dots}</div>
    <div class="flex items-baseline justify-between">
      <div class="font-display text-2xl font-extrabold">${p.isDeload?'Descarga':'Semana '+p.week+' de '+p.total}</div>
      <div class="px-2.5 py-1 rounded-lg bg-${accent}/10 text-${accent} text-sm font-bold">${p.name}</div>
    </div>
    ${p.isDeload?'':`<div class="text-[12px] mt-1.5">Esfuerzo objetivo: <span class="text-${accent} font-semibold">RIR ${p.rir}</span> <span class="text-muted">(reps en reserva)</span></div>`}
    <div class="text-[12px] text-muted mt-1.5 leading-snug">${p.desc}</div>
  </div>`;
}

function stepWidget(log){
  const goal = state.stepGoal;
  const steps = log.steps||0;
  const pct = Math.min(1, steps/goal);
  const r=42, c=2*Math.PI*r, off=c*(1-pct);
  const done = steps>=goal;
  return `
  <div class="rounded-2xl border ${done?'border-neon/50 glow':'border-line'} bg-panel p-4 fade-in">
    <div class="flex items-center gap-4">
      <div class="relative" style="width:104px;height:104px">
        <svg width="104" height="104" viewBox="0 0 104 104" class="-rotate-90">
          <circle cx="52" cy="52" r="42" fill="none" stroke="#2a2a31" stroke-width="9"/>

/* ---------- VISTA PROGRESO ---------- */
function viewProgress(){
  // Recolectar PRs por ejercicio (mejor peso registrado)
  const exNames = {};
  Object.values(state.routine).forEach(d=>{ if(d.exercises) d.exercises.forEach(e=> exNames[e.id]=e.name); });
  const prs = {};
  Object.values(state.logs).forEach(l=>{
    Object.entries(l.strength||{}).forEach(([id,data])=>{
      (data.sets||[]).forEach(s=>{
        const w=parseFloat(s.weight)||0;
        if(w>0 && (!prs[id]||w>prs[id])) prs[id]=w;
      });
    });
  });

  // Pasos últimos 7 días
  let stepsHtml='';
  const bars=[];
  for(let i=6;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i);
    const l=state.logs[todayKey(d)];
    bars.push({label:DAY_NAMES[DAYS[d.getDay()]].slice(0,2), steps:l?.steps||0});
  }
  const maxS=Math.max(state.stepGoal, ...bars.map(b=>b.steps));
  stepsHtml = bars.map(b=>{
    const h=Math.max(4, (b.steps/maxS)*88);
    const hit=b.steps>=state.stepGoal;
    return `<div class="flex-1 flex flex-col items-center gap-1">
      <div class="w-full flex items-end justify-center" style="height:88px">
        <div class="w-5 rounded-t-md ${hit?'bg-neon':'bg-sport/60'}" style="height:${h}px"></div>
      </div>
      <div class="text-[10px] text-muted">${b.label}</div>
    </div>`;
  }).join('');

  let prHtml='';
  const prKeys=Object.keys(prs);
  if(prKeys.length){
    prHtml = prKeys.map(id=>`
      <div class="flex items-center justify-between py-2.5 border-b border-line/50 last:border-0">
        <span class="text-sm truncate pr-3">${exNames[id]||'Ejercicio'}</span>
        <span class="font-mono font-bold text-neon tnum flex-none">${prs[id]} ${state.units}</span>
      </div>`).join('');
  } else {
    prHtml = `<div class="text-center text-muted text-sm py-6">Registrá tus series para ver tus marcas máximas acá.</div>`;
  }

  // Racha de días con entrenamiento registrado
  let streak=0;
  for(let i=0;i<60;i++){
    const d=new Date(); d.setDate(d.getDate()-i);
    const l=state.logs[todayKey(d)];
    const trained = l && ((l.running&&l.running.done) || (l.strength&&Object.keys(l.strength).length) || (l.steps>=state.stepGoal));
    if(trained) streak++; else if(i>0) break;
  }

  return `
  <div class="pt-1 space-y-4">
    <div class="grid grid-cols-2 gap-3">
      <div class="rounded-2xl border border-line bg-panel p-4">
        <div class="text-[11px] uppercase tracking-wider text-muted">Racha</div>
        <div class="font-display text-4xl font-extrabold text-neon tnum">${streak}</div>
        <div class="text-[11px] text-muted">días activos seguidos</div>
      </div>
      <div class="rounded-2xl border border-line bg-panel p-4">
        <div class="text-[11px] uppercase tracking-wider text-muted">Marcas (PR)</div>
        <div class="font-display text-4xl font-extrabold text-sport tnum">${prKeys.length}</div>
        <div class="text-[11px] text-muted">ejercicios con registro</div>
      </div>
    </div>

    <div class="rounded-2xl border border-line bg-panel p-4">
      <div class="text-[11px] uppercase tracking-[0.18em] text-muted mb-3">Pasos · últimos 7 días</div>
      <div class="flex items-end gap-1.5">${stepsHtml}</div>
    </div>

    <div class="rounded-2xl border border-line bg-panel p-4">
      <div class="text-[11px] uppercase tracking-[0.18em] text-muted mb-1">Pesos máximos por ejercicio</div>
      ${prHtml}
    </div>
  </div>`;
}

/* =========================================================
   BIND DE EVENTOS DE LA VISTA
   ========================================================= */
function bindView(){
  // Pasos
  document.querySelectorAll('.stepBtn').forEach(b=> b.onclick=()=>{
    const log=getLog(todayKey()); log.steps=(log.steps||0)+parseInt(b.dataset.add); save();
    if(log.steps>=state.stepGoal && log.steps-parseInt(b.dataset.add)<state.stepGoal) toast('🔥 ¡10.000 pasos logrados!');
    render();
  });
  const se=document.querySelector('.stepEdit');
  if(se) se.onclick=()=>{
    const v=prompt('Pasos de hoy:', getLog(todayKey()).steps||0);
    if(v!==null){ getLog(todayKey()).steps=Math.max(0,parseInt(v)||0); save(); render(); }
  };

  // Running
  const rd=document.getElementById('runDone');
  if(rd) rd.onclick=()=>{
    const log=getLog(todayKey());
    const min=parseInt(document.getElementById('runMin').value)||null;
    log.running = (log.running&&log.running.done)? null : {done:true, minutes:min};
    save(); if(log.running) toast('✓ Sesión Z2 validada'); render();
  };

  // Swap ejercicio
  document.querySelectorAll('.swapBtn').forEach(b=> b.onclick=()=>{
    const code=dayCode(); const e=state.routine[code].exercises.find(x=>x.id===b.dataset.ex);
    if(e){ e.swapped=!e.swapped; save(); render(); }
  });

  // Inputs de series -> guardar en vivo
  document.querySelectorAll('.setIn').forEach(inp=> inp.onchange=()=>{
    const log=getLog(todayKey()); const id=inp.dataset.ex; const s=parseInt(inp.dataset.set);
    if(!log.strength[id]) log.strength[id]={sets:[]};
    if(!log.strength[id].sets[s]) log.strength[id].sets[s]={};
    log.strength[id].sets[s][inp.dataset.f]= inp.value===''? null : parseFloat(inp.value);
    save();
  });

  // Guardar serie + progresión
  document.querySelectorAll('.logBtn').forEach(b=> b.onclick=()=> checkProgression(b.dataset.ex));

  // Editar día (fuerza)
  document.querySelectorAll('.editDay').forEach(b=> b.onclick=()=> openDayEditor(b.dataset.day));

  // Vista semana -> abrir día
  document.querySelectorAll('.weekDay').forEach(b=> b.onclick=()=>{
    const code=b.dataset.day;
    if(state.routine[code].type==='strength') openDayEditor(code);
    else toast('Día de '+(state.routine[code].type==='running'?'cardio':'descanso'));
  });
}

/* =========================================================
   ALGORITMO DE SOBRECARGA PROGRESIVA (+2.5 kg)
   ========================================================= */
function checkProgression(exId){
  const code=dayCode();
  const e=state.routine[code].exercises.find(x=>x.id===exId);
  if(!e) return;
  const log=getLog(todayKey());
  const data=log.strength[exId];
  const sets=effectiveSets(e.sets);

  if(!data || !data.sets || data.sets.filter(s=>s&&s.reps).length<sets){
    toast('Completá las '+sets+' series primero'); return;
  }

  const weights=data.sets.slice(0,sets).map(s=>parseFloat(s.weight)||0);
  const reps=data.sets.slice(0,sets).map(s=>parseInt(s.reps)||0);
  const baseW=Math.max(...weights);

  // ¿Todas las series alcanzaron el tope de repeticiones?
  const allMax = reps.every(r=> r>=e.repMax);

  if(allMax){
    // Doble progresión: subir peso y volver al piso del rango
    const newW = baseW + 2.5;
    state.targets[exId] = { weight:newW, reps:e.repMin };
    save();
    successSheet(e, baseW, newW);
  } else {
    // Mantener peso, objetivo: sumar reps hacia el tope
    const minReps=Math.min(...reps);
    state.targets[exId] = { weight:baseW, reps: Math.min(e.repMax, minReps+1) };
    save();
    toast(`💪 Registrado · próxima meta: ${baseW} ${state.units} × ${state.targets[exId].reps}`);
    render();
  }
}

function successSheet(e, oldW, newW){
  openSheet(`
    <div class="p-6 text-center">
      <div class="w-16 h-16 mx-auto rounded-full bg-neon/15 border border-neon/40 glow flex items-center justify-center text-3xl pop">🚀</div>
      <div class="font-display text-2xl font-extrabold mt-3">¡Progresión desbloqueada!</div>
      <div class="text-sm text-muted mt-1">Completaste todas las series en el tope del rango.</div>
      <div class="mt-5 flex items-center justify-center gap-4">
        <div class="text-center"><div class="text-[10px] text-muted uppercase">Anterior</div><div class="font-mono text-xl tnum">${oldW} ${state.units}</div></div>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#00ff88" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        <div class="text-center"><div class="text-[10px] text-neon uppercase">Próxima sesión</div><div class="font-mono text-xl tnum text-neon font-bold">${newW} ${state.units}</div></div>

      <button class="closeSheet tap w-full mt-5 py-3 rounded-xl bg-neon text-ink font-bold">Entendido</button>
    </div>
  `);
  render();
}

      const name=r.querySelector('.edName').value.trim();
      if(!name) return;
      const oldId = r.dataset.ed.startsWith('new')? null : r.dataset.ed;
      const old = oldId? day.exercises.find(x=>x.id===oldId) : null;
      out.push({
        id: oldId || ('e'+Math.random().toString(36).slice(2,9)),
        name,
        alt: r.querySelector('.edAlt').value.trim() || name,
        sets: Math.max(1, parseInt(r.querySelector('.edSets').value)||3),
        repMin: Math.max(1, parseInt(r.querySelector('.edMin').value)||8),
        repMax: Math.max(1, parseInt(r.querySelector('.edMax').value)||10),
        rest: r.querySelector('.edRest').value.trim() || '90s',
        swapped: old? old.swapped : false,
      });
    });
    day.exercises=out; save(); closeSheet(); render(); toast('✓ Rutina actualizada');
  };
}

/* =========================================================
   AJUSTES (deload, unidades, meta, backup, reset)
   ========================================================= */
document.getElementById('settingsBtn').onclick=()=>{
  openSheet(`
  <div class="px-5 pt-5 pb-5">
    <div class="w-10 h-1 bg-line rounded-full mx-auto mb-4"></div>
    <div class="font-display text-2xl font-extrabold mb-4">Ajustes</div>

    <div class="rounded-2xl border border-line bg-panel2 p-4 mb-3">
      <div class="flex items-center justify-between">
        <div class="pr-3">
          <div class="font-semibold">Periodización automática</div>
          <div class="text-[12px] text-muted">La app cuenta tus semanas entrenadas y activa la descarga sola.</div>
        </div>
        <div id="autoToggle" class="toggle ${state.autoPeriodization?'on':''}"></div>
      </div>

      <div id="autoOpts" class="${state.autoPeriodization?'':'hidden'} mt-4 pt-4 border-t border-line">
        <div class="text-[12px] text-muted mb-2">Semanas de carga antes de cada descarga</div>
        <div class="flex gap-2">
          ${[3,4,5,6].map(n=>`<button class="cycleBtn tap flex-1 py-2 rounded-lg border border-line text-sm font-bold tnum ${state.cycleLength===n?'seg-active text-neon':'text-muted'}" data-n="${n}">${n}</button>`).join('')}
        </div>
        <div class="text-[11px] text-muted mt-2 leading-snug">Ej. en "3": semanas 1-2-3 en carga progresiva y la 4ª en descarga, repitiendo el ciclo.</div>
        <div class="mt-3 text-[12px] text-muted mb-2">Días mínimos para contar una semana</div>
        <div class="flex gap-2">
          ${[2,3,4].map(n=>`<button class="thrBtn tap flex-1 py-2 rounded-lg border border-line text-sm font-bold tnum ${state.weekThreshold===n?'seg-active text-neon':'text-muted'}" data-n="${n}">${n} días</button>`).join('')}
        </div>
      </div>

      <div id="manualOpts" class="${state.autoPeriodization?'hidden':''} mt-4 pt-4 border-t border-line flex items-center justify-between">
        <div class="pr-3"><div class="font-semibold text-sm">Forzar descarga ahora</div><div class="text-[12px] text-muted">Modo manual</div></div>
        <div id="deloadToggle" class="toggle ${state.deload?'on':''}"></div>
      </div>
    </div>

    <div class="rounded-2xl border border-line bg-panel2 p-4 mb-3">
      <div class="font-semibold mb-2">Unidad de peso</div>
      <div class="flex gap-2">
        <button class="unitBtn tap flex-1 py-2 rounded-lg border border-line text-sm font-bold ${state.units==='kg'?'seg-active text-neon':'text-muted'}" data-u="kg">KG</button>
        <button class="unitBtn tap flex-1 py-2 rounded-lg border border-line text-sm font-bold ${state.units==='lbs'?'seg-active text-neon':'text-muted'}" data-u="lbs">LBS</button>
      </div>
    </div>

    <div class="rounded-2xl border border-line bg-panel2 p-4 mb-3 flex items-center justify-between">
      <div class="pr-3"><div class="font-semibold">Meta de pasos</div><div class="text-[12px] text-muted">Objetivo diario</div></div>
      <input id="goalIn" type="number" inputmode="numeric" value="${state.stepGoal}" class="w-24 bg-panel border border-line rounded-lg px-2 py-2 font-mono tnum text-center focus:border-neon outline-none">
    </div>

    <div class="rounded-2xl border border-line bg-panel2 p-4 mb-3">
      <div class="font-semibold mb-1">Respaldo de datos</div>
      <div class="text-[12px] text-muted mb-3">Exportá tu progreso a un archivo. Importante si cambiás de teléfono o limpiás el navegador.</div>
      <div class="grid grid-cols-2 gap-2">
        <button id="exportBtn" class="tap py-2.5 rounded-lg bg-neon text-ink font-bold text-sm">Exportar</button>
        <button id="importBtn" class="tap py-2.5 rounded-lg bg-panel border border-line font-semibold text-sm">Importar</button>
      </div>
      <input id="importFile" type="file" accept="application/json" class="hidden">
    </div>

    <button id="resetAll" class="tap w-full py-3 rounded-xl border border-red-500/30 text-red-400 font-semibold text-sm">Borrar todos los datos</button>
    <div class="text-center text-[11px] text-muted mt-4">Mutación 2026 · datos guardados en este dispositivo</div>
  </div>
  `);

  const reopen = ()=> document.getElementById('settingsBtn').onclick();
  document.getElementById('autoToggle').onclick=function(){
    state.autoPeriodization=!state.autoPeriodization; save(); render(); reopen();
    toast(state.autoPeriodization?'⚙️ Periodización automática':'Modo manual');
  };
  document.querySelectorAll('.cycleBtn').forEach(b=> b.onclick=()=>{ state.cycleLength=parseInt(b.dataset.n); save(); render(); reopen(); });
  document.querySelectorAll('.thrBtn').forEach(b=> b.onclick=()=>{ state.weekThreshold=parseInt(b.dataset.n); save(); render(); reopen(); });
  const dt=document.getElementById('deloadToggle');
  if(dt) dt.onclick=function(){
    state.deload=!state.deload; this.classList.toggle('on',state.deload); save(); render();
    toast(state.deload?'🔵 Descarga activada':'Descarga desactivada');
  };
  document.querySelectorAll('.unitBtn').forEach(b=> b.onclick=()=>{ state.units=b.dataset.u; save(); reopen(); });
  document.getElementById('goalIn').onchange=function(){ state.stepGoal=Math.max(1000,parseInt(this.value)||10000); save(); };
  document.getElementById('exportBtn').onclick=exportData;
  document.getElementById('importBtn').onclick=()=> document.getElementById('importFile').click();
  document.getElementById('importFile').onchange=importData;
  document.getElementById('resetAll').onclick=()=>{
    if(confirm('¿Borrar TODO? Esto elimina rutina personalizada e historial. Exportá primero si querés un respaldo.')){
      localStorage.removeItem(STORAGE_KEY); state=load(); closeSheet(); render(); toast('Datos borrados');
    }
  };
};

function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`mutacion2026_${todayKey()}.json`; a.click();
  URL.revokeObjectURL(url);
  toast('✓ Respaldo exportado');
}
function importData(ev){
  const f=ev.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const data=JSON.parse(r.result);
      if(!data.routine) throw new Error();
      state=data; save(); closeSheet(); render(); toast('✓ Datos importados');
    }catch(e){ toast('⚠️ Archivo no válido'); }
  };
  r.readAsText(f);
}

/* =========================================================
   SHEET / TOAST HELPERS
   ========================================================= */
function openSheet(html){
  const s=document.getElementById('sheet');
  document.getElementById('sheetBody').innerHTML=html;
  s.classList.remove('hidden');
  document.getElementById('sheetBody').querySelectorAll('.closeSheet').forEach(b=> b.onclick=closeSheet);
}
function closeSheet(){ document.getElementById('sheet').classList.add('hidden'); }
document.getElementById('sheetBackdrop').onclick=closeSheet;

let toastT;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.remove('hidden'); t.classList.remove('pop'); void t.offsetWidth; t.classList.add('pop');
  clearTimeout(toastT); toastT=setTimeout(()=> t.classList.add('hidden'), 2200);
}
function escapeAttr(s){ return String(s).replace(/"/g,'&quot;'); }

/* =========================================================
   INIT
   ========================================================= */
render();
</script>
